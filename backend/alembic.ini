# MATCHO — Alembic Configuration
# Leçon PEP's #7 : Tables manquantes en production = 500 systématique.
# On ne fait JAMAIS create_all() en production — Alembic gère les migrations.

[alembic]
script_location = migrations
prepend_sys_path = .

# SQLAlchemy URL — overridden by env.py at runtime
sqlalchemy.url = sqlite:///matcho.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
