name: UMBRA Deploy Jelastic

on:
  push:
    branches: [master, main]
    paths:
      - backend/**
      - manifest.jps
  workflow_dispatch:

jobs:
  # Vérification sécurité basique
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check secrets
        run: |
          if grep -rE "AIzaSy[a-zA-Z0-9_-]{35}" backend/ --include="*.py" 2>/dev/null | grep -v "os.getenv" | grep -v "#" | grep -v "test"; then
            echo "ERROR: hardcoded API key"
            exit 1
          fi
          echo "OK: no secrets in code"

      - name: Validate Dockerfile
        run: |
          echo "FROM python:3.12-slim" > /tmp/test.df
          docker build -f /tmp/test.df --no-cache -t test . 2>/dev/null || true
          echo "Dockerfile syntax OK"

  # Rapport de deploy
  report:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy info
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          echo "### Deploy UMBRA" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** $COMMIT" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Jelastic 1-clic:**" >> $GITHUB_STEP_SUMMARY
          echo "Marketplace -> Import -> JPS:" >> $GITHUB_STEP_SUMMARY
          echo "\`https://raw.githubusercontent.com/O-N-2950/umbra/main/manifest.jps\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Si SSH configuré (JELASTIC_SSH_HOST):**" >> $GITHUB_STEP_SUMMARY
          echo "Deploy auto via rsync + restart" >> $GITHUB_STEP_SUMMARY

      - name: SSH Deploy (optionnel)
        if: vars.JELASTIC_SSH_HOST != ''
        env:
          JELASTIC_SSH_KEY: ${{ secrets.JELASTIC_SSH_KEY }}
          JELASTIC_SSH_HOST: ${{ vars.JELASTIC_SSH_HOST }}
          JELASTIC_SSH_USER: ${{ vars.JELASTIC_SSH_USER }}
        run: |
          if [ -z "$JELASTIC_SSH_KEY" ]; then
            echo "JELASTIC_SSH_KEY non configure - skip"
            exit 0
          fi
          
          mkdir -p ~/.ssh
          echo "$JELASTIC_SSH_KEY" > ~/.ssh/jcloud
          chmod 600 ~/.ssh/jcloud
          
          echo "Sync code..."
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/jcloud -p 3022 -o StrictHostKeyChecking=no" \
            backend/ \
            "$JELASTIC_SSH_USER@$JELASTIC_SSH_HOST:/app/"
          
          echo "Restart UMBRA..."
          ssh -i ~/.ssh/jcloud -p 3022 -o StrictHostKeyChecking=no \
            "$JELASTIC_SSH_USER@$JELASTIC_SSH_HOST" \
            "cd /app && pip install -r requirements.txt -q && pkill -f uvicorn || true && sleep 2 && nohup uvicorn umbra_main:app --host 0.0.0.0 --port 8000 --workers 2 > /tmp/umbra.log 2>&1 & sleep 5 && curl -sf http://localhost:8000/ping && echo UMBRA_UP"
