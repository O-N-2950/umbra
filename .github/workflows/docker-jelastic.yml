name: UMBRA Build Docker GHCR

on:
  push:
    branches: [master, main]
    paths:
      - backend/**
      - Dockerfile
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: o-n-2950/umbra

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scanner les secrets
        run: |
          if grep -rE "AIzaSy[a-zA-Z0-9_-]{35}" backend/ --include="*.py" 2>/dev/null | grep -v "os.getenv" | grep -v "#"; then
            echo "ERREUR: Cle API en dur dans le code"
            exit 1
          fi
          echo "OK: aucun secret detecte"

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/o-n-2950/umbra
          tags: |
            type=raw,value=latest
            type=sha,prefix=git-

      - name: Build et push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resume
        run: |
          echo "Image publiee: ghcr.io/o-n-2950/umbra:latest"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo ""
          echo "Deploy Jelastic 1-clic:"
          echo "https://raw.githubusercontent.com/O-N-2950/umbra/main/manifest.jps"

  deploy-jelastic:
    needs: build-push
    runs-on: ubuntu-latest
    if: vars.JELASTIC_APP_URL != ''

    steps:
      - name: Health check
        env:
          APP_URL: ${{ vars.JELASTIC_APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "JELASTIC_APP_URL non configure - skip"
            exit 0
          fi
          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf --max-time 15 -o /dev/null -w "%{http_code}" "$APP_URL/ping" 2>/dev/null || echo "000")
            echo "Tentative $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "UMBRA OK" && exit 0
            sleep 15
          done
          echo "Health check timeout - verifier Jelastic dashboard"
