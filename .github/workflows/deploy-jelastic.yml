name: 🌑 UMBRA — Deploy Jelastic Infomaniak

on:
  push:
    branches: [master, main]
    paths:
      - 'backend/**'
      - 'Dockerfile'
      - 'manifest.jps'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

# Éviter les deploys concurrents
concurrency:
  group: deploy-jelastic-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Vérifications avant deploy ──────────────────────────
  pre-deploy:
    name: ✅ Pré-deploy checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scanner les secrets (ne jamais committer une clé)
        run: |
          echo "🔍 Scanner les secrets..."
          if grep -rE "AIzaSy|sk_live|phc_|whsec_|re_[a-zA-Z0-9]{24}" backend/ --include="*.py" --exclude-dir=__pycache__; then
            echo "❌ CLÉS DÉTECTÉES DANS LE CODE — Commit annulé"
            exit 1
          fi
          echo "✅ Aucun secret détecté"

      - name: Vérifier le Dockerfile
        run: |
          echo "🐳 Vérification Dockerfile..."
          docker build --no-cache -t umbra-test . 2>&1 | tail -5
          echo "✅ Build Docker OK"

  # ── 2. Deploy sur Jelastic via SSH ─────────────────────────
  deploy:
    name: 🚀 Deploy Jelastic
    needs: pre-deploy
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ vars.JELASTIC_APP_URL }}
    
    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Setup SSH vers Jelastic
        env:
          JELASTIC_SSH_KEY: ${{ secrets.JELASTIC_SSH_KEY }}
          JELASTIC_HOST: ${{ secrets.JELASTIC_SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$JELASTIC_SSH_KEY" > ~/.ssh/jelastic_key
          chmod 600 ~/.ssh/jelastic_key
          ssh-keyscan -H "$JELASTIC_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 📦 Sync code vers Jelastic
        env:
          JELASTIC_SSH_HOST: ${{ secrets.JELASTIC_SSH_HOST }}
          JELASTIC_SSH_USER: ${{ secrets.JELASTIC_SSH_USER }}
          JELASTIC_NODE_ID: ${{ secrets.JELASTIC_NODE_ID }}
        run: |
          echo "📤 Upload backend → Jelastic..."
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/jelastic_key -p 3022 -o StrictHostKeyChecking=no" \
            backend/ \
            "${JELASTIC_SSH_USER}@${JELASTIC_SSH_HOST}:/app/umbra/"
          echo "✅ Code synchronisé"

      - name: 🔄 Redémarrer l'application
        env:
          JELASTIC_SSH_HOST: ${{ secrets.JELASTIC_SSH_HOST }}
          JELASTIC_SSH_USER: ${{ secrets.JELASTIC_SSH_USER }}
        run: |
          ssh -i ~/.ssh/jelastic_key -p 3022 \
            -o StrictHostKeyChecking=no \
            "${JELASTIC_SSH_USER}@${JELASTIC_SSH_HOST}" << 'REMOTE'
          set -e
          echo "🔄 Redémarrage UMBRA..."
          cd /app/umbra
          pip install --no-cache-dir -r requirements.txt -q 2>&1 | tail -3
          pkill -f "uvicorn umbra_main" || true
          sleep 2
          nohup uvicorn umbra_main:app --host 0.0.0.0 --port 8000 --workers 2 \
            > /var/log/umbra.log 2>&1 &
          sleep 4
          curl -sf http://localhost:8000/ping && echo "✅ UMBRA UP"
          REMOTE

      - name: 🏥 Health check post-deploy
        env:
          JELASTIC_APP_URL: ${{ vars.JELASTIC_APP_URL }}
        run: |
          echo "🏥 Vérification santé..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf --max-time 15 "${JELASTIC_APP_URL}/health" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('score','?'))" 2>/dev/null || echo "?")
            echo "  Tentative $i: santé = $STATUS"
            [ "$STATUS" != "?" ] && break
            sleep 10
          done

      - name: 📢 Notification Sentry new release
        if: success()
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [ -n "$SENTRY_DSN" ]; then
            curl -sf -X POST \
              -H "Content-Type: application/json" \
              -d "{\"version\": \"$COMMIT_SHA\", \"projects\": [\"umbra\"]}" \
              "https://sentry.io/api/0/organizations/pepssaissas/releases/" \
              -H "Authorization: Bearer ${{ secrets.SENTRY_AUTH_TOKEN }}" \
              && echo "✅ Sentry notifié" || echo "⚠️ Sentry non configuré"
          fi

  # ── 3. Tests smoke post-deploy ──────────────────────────────
  smoke-test:
    name: 🔥 Smoke tests
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Test routes critiques
        env:
          APP_URL: ${{ vars.JELASTIC_APP_URL }}
        run: |
          echo "=== Smoke tests UMBRA Jelastic ==="
          
          fail=0
          for route in "/ping" "/health" "/api/umbra/cv-pricing" "/api/v1/analytics/events"; do
            STATUS=$(curl -sf --max-time 20 -o /dev/null -w "%{http_code}" "${APP_URL}${route}" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "  ✅ $route → $STATUS"
            else
              echo "  ❌ $route → $STATUS"
              fail=1
            fi
          done
          
          if [ $fail -ne 0 ]; then
            echo "❌ Smoke tests échoués — investigate"
            exit 1
          fi
          echo "✅ Tous les smoke tests OK"
