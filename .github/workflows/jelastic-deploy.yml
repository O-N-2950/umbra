name: UMBRA Jelastic Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - backend/**
      - scripts/deploy-jelastic.py

concurrency:
  group: jelastic-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Test connectivite Jelastic
        run: |
          echo "Test reseau vers Jelastic Infomaniak..."
          curl -s --max-time 10 -o /dev/null -w "HTTP %{http_code}\n" \
            "https://3pxsmf7oa31n.infomaniak.jcloud-ver-jpc.ik-server.com/1.0/users/rest/getinfo?appid=jelastic&session=test" \
            || echo "Endpoint inaccessible"

      - name: Deploy UMBRA sur Jelastic
        env:
          JELASTIC_TOKEN: ${{ secrets.JELASTIC_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        run: python3 scripts/deploy-jelastic.py

      - name: Health check final
        if: success()
        run: |
          echo "Attente stabilisation (30s)..."
          sleep 30
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf --max-time 15 -o /dev/null -w "%{http_code}" \
              "https://umbra-prod.jcloud.ik-server.com/ping" 2>/dev/null || echo "000")
            echo "Tentative $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "UMBRA EST EN LIGNE" && exit 0
            sleep 15
          done
          echo "Pas encore accessible - verifier le dashboard Jelastic"
