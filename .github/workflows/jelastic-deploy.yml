name: UMBRA Jelastic Deploy

on:
  workflow_dispatch:   # neutralise: declenchement manuel uniquement (ancienne methode instable)

concurrency:
  group: jelastic-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Deploy UMBRA sur Jelastic
        env:
          JELASTIC_TOKEN: ${{ secrets.JELASTIC_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: python3 scripts/deploy-jelastic.py

      - name: Health check final
        if: success()
        run: |
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -sf --max-time 15 -o /dev/null -w "%{http_code}" \
              "https://umbra-prod.jcloud-ver-jpc.ik-server.com/ping" 2>/dev/null || echo "000")
            echo "Tentative $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "UMBRA EST EN LIGNE" && exit 0
            sleep 20
          done
          echo "Pas encore accessible (pip install en cours probablement)"
